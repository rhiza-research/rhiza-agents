<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Config - Rhiza Agents</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="config-page">
        <header class="config-header">
            <a href="/" class="back-link">&larr; Back to Chat</a>
            <span class="config-title">Rhiza Agents</span>
            <span class="config-user">{{ user_name }}</span>
        </header>

        <div class="config-layout">
            <div class="config-sidebar">
                <h3 class="config-sidebar-title">Agents</h3>
                <div id="agent-list" class="agent-list"></div>
                <button id="add-agent-btn" class="add-agent-btn">+ Add Agent</button>
                <button id="reset-all-btn" class="reset-all-btn">Reset All to Defaults</button>

                <h3 class="config-sidebar-title" style="margin-top: 1.5rem;">Knowledge Bases</h3>
                <div id="vectorstore-list" class="vectorstore-list"></div>
                <button id="add-vs-btn" class="add-agent-btn">+ New Knowledge Base</button>
            </div>

            <div class="config-detail" id="config-detail">
                <div class="config-placeholder">
                    <p>Select an agent to edit its configuration.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- New Agent Modal -->
    <div id="new-agent-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h3>Create New Agent</h3>
            <div class="form-group">
                <label for="new-agent-id">Agent ID</label>
                <input type="text" id="new-agent-id" placeholder="my_custom_agent" pattern="[a-zA-Z][a-zA-Z0-9_]*">
                <small>Alphanumeric and underscores, must start with a letter</small>
            </div>
            <div class="form-group">
                <label for="new-agent-name">Display Name</label>
                <input type="text" id="new-agent-name" placeholder="My Custom Agent">
            </div>
            <div class="form-group">
                <label for="new-agent-prompt">System Prompt</label>
                <textarea id="new-agent-prompt" rows="4" placeholder="You are a helpful assistant..."></textarea>
            </div>
            <div class="form-group">
                <label for="new-agent-model">Model</label>
                <select id="new-agent-model">
                    <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                    <option value="claude-opus-4-20250514">Claude Opus 4</option>
                    <option value="claude-haiku-3-20240307">Claude Haiku 3</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="cancel-new-agent" class="btn-secondary">Cancel</button>
                <button id="confirm-new-agent" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <!-- New Vector Store Modal -->
    <div id="new-vs-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h3>Create Knowledge Base</h3>
            <div class="form-group">
                <label for="new-vs-name">Name</label>
                <input type="text" id="new-vs-name" placeholder="Research Papers">
            </div>
            <div class="form-group">
                <label for="new-vs-desc">Description</label>
                <textarea id="new-vs-desc" rows="2" placeholder="What kind of documents will be stored here?"></textarea>
            </div>
            <div class="modal-actions">
                <button id="cancel-new-vs" class="btn-secondary">Cancel</button>
                <button id="confirm-new-vs" class="btn-primary">Create</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/config.js"></script>
</body>
</html>
