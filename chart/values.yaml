# Default values for rhiza-agents.

# Container image configuration
image:
  repository: ghcr.io/rhiza-research/rhiza-agents
  tag: latest
  pullPolicy: Always

# Image pull secrets (not needed for public GHCR repos)
imagePullSecrets: []

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Resource configuration
# ChromaDB runs in-process with the all-MiniLM-L6-v2 embedding model in memory.
# Document ingestion (chunking + embedding) is CPU-bound and memory-intensive.
# TODO: Validate these values against actual pod metrics after deployment.
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Persistent volume for SQLite database, LangGraph checkpoints, and ChromaDB
persistence:
  size: 5Gi
  storageClassName: standard-rwo

# Name of the Kubernetes secret containing sensitive env vars.
# This secret is created by Terraform, NOT by this chart.
# Keys: KEYCLOAK_CLIENT_SECRET, ANTHROPIC_API_KEY, DAYTONA_API_KEY, DAYTONA_API_URL,
#       SECRET_KEY, LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY
secretName: rhiza-agents-secrets

# Non-secret environment variables
env:
  KEYCLOAK_URL: ""
  KEYCLOAK_PUBLIC_URL: ""
  KEYCLOAK_REALM: ""
  KEYCLOAK_CLIENT_ID: ""
  MCP_SERVER_URL: ""
  BASE_URL: ""
  # Langfuse observability — base URL and the environment tag the SDK
  # attaches to every trace so a single Langfuse project can separate
  # dev and prod traffic via the environment filter.
  LANGFUSE_BASE_URL: ""
  LANGFUSE_TRACING_ENVIRONMENT: ""
  # DATABASE_URL is set automatically to point at the PVC-mounted SQLite file
  # CHECKPOINT_DB_PATH is set automatically to point at the PVC-mounted checkpoints file
  # CHROMA_PERSIST_DIR is set automatically to point at the PVC-mounted chroma directory
