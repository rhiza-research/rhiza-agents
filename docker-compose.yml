services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro

  sheerwater-mcp:
    image: ghcr.io/rhiza-research/sheerwater/mcp:latest
    # To build from source instead of pulling the image, uncomment:
    # build:
    #   context: ../sheerwater
    #   dockerfile: mcp/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../sheerwater/sheerwater:/app/sheerwater:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      GOOGLE_CLOUD_PROJECT: sheerwater
      CHART_BUCKET_NAME: sheerwater-mcp-charts
      SIGNING_SERVICE_ACCOUNT: ${SIGNING_SERVICE_ACCOUNT}

  langgraph-server:
    build: .
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      - ./src:/app/src:ro
      - config-data:/data
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MCP_SERVER_URL: http://sheerwater-mcp:8000/sse
      CONFIG_DB_PATH: /data/config.db
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      DAYTONA_API_URL: ${DAYTONA_API_URL}
      DAYTONA_PROXY_URL: ${DAYTONA_PROXY_URL}
      BG_JOB_ISOLATED_LOOPS: "true"
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-rhiza-agents}
    depends_on:
      sheerwater-mcp:
        condition: service_started

  config-api:
    build: .
    restart: unless-stopped
    command: ["uv", "run", "uvicorn", "rhiza_agents.api:app", "--host", "0.0.0.0", "--port", "8081"]
    ports:
      - "8081:8081"
    volumes:
      - ./src:/app/src:ro
      - config-data:/data
    environment:
      CONFIG_DB_PATH: /data/config.db
      MCP_SERVER_URL: http://sheerwater-mcp:8000/sse
    depends_on:
      sheerwater-mcp:
        condition: service_started

  # Deep Agents UI (Next.js frontend)
  # Deployment URL and Assistant ID are baked in at build time via NEXT_PUBLIC_ args
  deep-agents-ui:
    build:
      context: ../deep-agents-ui
      args:
        NEXT_PUBLIC_DEPLOYMENT_URL: http://localhost:8123
        NEXT_PUBLIC_ASSISTANT_ID: agent
    restart: unless-stopped
    ports:
      - "3100:3000"
    volumes:
      - ../deep-agents-ui/src:/app/src
      - ../deep-agents-ui/docker-watch.sh:/app/docker-watch.sh:ro
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: http://localhost:8123
      NEXT_PUBLIC_ASSISTANT_ID: agent
      # NextAuth.js + Keycloak OIDC
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-in-production}
      AUTH_TRUST_HOST: "true"
      KEYCLOAK_CLIENT_ID: rhiza-agents
      KEYCLOAK_CLIENT_SECRET: dev-secret
      KEYCLOAK_REALM: sheerwater
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:8180
      NEXT_PUBLIC_CONFIG_API_URL: http://localhost:8081
    # Run file watcher alongside dev server to trigger hot reload in podman
    command: ["sh", "-c", "/app/docker-watch.sh /app/src 2 & exec yarn dev"]
    depends_on:
      - langgraph-server
      - config-api
      - keycloak

volumes:
  config-data:
