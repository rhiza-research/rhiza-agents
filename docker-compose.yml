services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro

  sheerwater-mcp:
    image: ghcr.io/rhiza-research/sheerwater/mcp:latest
    build:
      context: ../sheerwater
      dockerfile: mcp/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../sheerwater/sheerwater:/app/sheerwater:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      GOOGLE_CLOUD_PROJECT: sheerwater
      CHART_BUCKET_NAME: sheerwater-mcp-charts
      SIGNING_SERVICE_ACCOUNT: ${SIGNING_SERVICE_ACCOUNT}

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: langgraph
      POSTGRES_DB: langgraph
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  langgraph-server:
    image: ghcr.io/rhiza-research/rhiza-agents:latest
    build: .
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      - ./src:/app/src:ro
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MCP_SERVER_URL: http://sheerwater-mcp:8000/sse
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-rhiza-agents}
      LANGGRAPH_POSTGRES_URI: postgres://langgraph:langgraph@postgres:5432/langgraph
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sheerwater-mcp:
        condition: service_started

  deep-agents-ui:
    image: ghcr.io/langchain-ai/deep-agents-ui:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      LANGGRAPH_API_URL: http://langgraph-server:8123
    depends_on:
      - langgraph-server

volumes:
  pgdata:
