services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro

  sheerwater-mcp:
    image: ghcr.io/rhiza-research/sheerwater/mcp:latest
    build:
      context: ../sheerwater
      dockerfile: mcp/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../sheerwater/sheerwater:/app/sheerwater:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      GOOGLE_CLOUD_PROJECT: sheerwater
      CHART_BUCKET_NAME: sheerwater-mcp-charts
      SIGNING_SERVICE_ACCOUNT: ${SIGNING_SERVICE_ACCOUNT}

  esbuild:
    image: node:23-alpine
    working_dir: /app/frontend
    command: sh -c "npm install --prefer-offline && node watch.mjs"
    restart: unless-stopped
    environment:
      ESBUILD_OUTFILE: /app/static/app.js
    volumes:
      - ./frontend/src:/app/frontend/src:ro
      - ./frontend/package.json:/app/frontend/package.json
      - ./frontend/package-lock.json:/app/frontend/package-lock.json
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json:ro
      - ./frontend/watch.mjs:/app/frontend/watch.mjs:ro
      - ./src/rhiza_agents/static:/app/static
      - esbuild-node-modules:/app/frontend/node_modules

  rhiza-agents:
    image: ghcr.io/rhiza-research/rhiza-agents:latest
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src:ro
      - rhiza-data:/data
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:8180
      KEYCLOAK_REALM: sheerwater
      KEYCLOAK_CLIENT_ID: rhiza-agents
      KEYCLOAK_CLIENT_SECRET: dev-secret
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: dev-secret-key
      MCP_SERVER_URL: http://sheerwater-mcp:8000/sse
      BASE_URL: http://localhost:8080
      DATABASE_URL: sqlite:////data/rhiza_agents.db
      CHECKPOINT_DB_PATH: /data/checkpoints.db
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      DAYTONA_API_URL: ${DAYTONA_API_URL:-}
      DAYTONA_PROXY_URL: ${DAYTONA_PROXY_URL:-}
      CHROMA_PERSIST_DIR: /data/chroma
      CHAT_EVENT_LOGGING: "true"
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      - keycloak
      - sheerwater-mcp

volumes:
  rhiza-data:
  esbuild-node-modules:
