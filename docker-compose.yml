services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro

  sheerwater-mcp:
    image: ghcr.io/rhiza-research/sheerwater/mcp:latest
    build:
      context: ../sheerwater
      dockerfile: mcp/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../sheerwater/sheerwater:/app/sheerwater:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
    environment:
      GOOGLE_CLOUD_PROJECT: sheerwater
      CHART_BUCKET_NAME: sheerwater-mcp-charts
      SIGNING_SERVICE_ACCOUNT: ${SIGNING_SERVICE_ACCOUNT}

  esbuild:
    image: node:23-alpine
    working_dir: /app/frontend
    command: sh -c "npm install --prefer-offline && node watch.mjs"
    restart: unless-stopped
    environment:
      ESBUILD_OUTFILE: /app/static/app.js
    volumes:
      - ./frontend/src:/app/frontend/src:ro
      - ./frontend/package.json:/app/frontend/package.json
      - ./frontend/package-lock.json:/app/frontend/package-lock.json
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json:ro
      - ./frontend/watch.mjs:/app/frontend/watch.mjs:ro
      - ./src/rhiza_agents/static:/app/static
      - esbuild-node-modules:/app/frontend/node_modules

  rhiza-agents:
    image: ghcr.io/rhiza-research/rhiza-agents:latest
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src:ro
      - ./data/app:/data
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:8180
      KEYCLOAK_REALM: sheerwater
      KEYCLOAK_CLIENT_ID: rhiza-agents
      KEYCLOAK_CLIENT_SECRET: dev-secret
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: dev-secret-key
      MCP_SERVER_URL: http://sheerwater-mcp:8000/sse
      BASE_URL: http://localhost:8080
      DATABASE_URL: sqlite:////data/rhiza_agents.db
      CHECKPOINT_DB_PATH: /data/checkpoints.db
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      DAYTONA_API_URL: ${DAYTONA_API_URL:-}
      DAYTONA_PROXY_URL: ${DAYTONA_PROXY_URL:-}
      CHROMA_PERSIST_DIR: /data/chroma
      CHAT_EVENT_LOGGING: "true"
      WATCHFILES_FORCE_POLLING: "true"
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      # Defaults to the bundled langfuse-web service so the dev stack works
      # out of the box. Override in .envrc with
      # LANGFUSE_BASE_URL=https://cloud.langfuse.com (or the US equivalent)
      # to point local dev at cloud Langfuse instead.
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://langfuse-web:3000}
      LANGFUSE_TRACING_ENVIRONMENT: ${LANGFUSE_TRACING_ENVIRONMENT:-development}
      # Fernet key (32-byte urlsafe base64) for encrypting user credentials
      # at rest. Generate with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # When unset the credentials feature is disabled and credential API
      # routes return 503.
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
    depends_on:
      - keycloak
      - sheerwater-mcp

  # ---------------------------------------------------------------------------
  # Langfuse — LLM observability stack.
  # Vendored from upstream langfuse/langfuse docker-compose. The langfuse-web
  # service is bootstrapped on first start with a known org/project/keys via
  # LANGFUSE_INIT_* env vars (headless initialization). Wipe the postgres
  # volume to re-init from scratch.
  #
  # All langfuse-* services live behind the `langfuse` compose profile so
  # they only start when explicitly opted in. Default `podman compose up`
  # leaves them off — most dev workflows now point at cloud Langfuse via
  # LANGFUSE_BASE_URL in .envrc instead. To run the local Langfuse stack:
  #     podman compose --profile langfuse up -d
  # ---------------------------------------------------------------------------
  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    restart: always
    profiles: ["langfuse"]
    depends_on: &langfuse-depends-on
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    ports:
      - 127.0.0.1:3030:3030
    environment: &langfuse-worker-env
      NEXTAUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@langfuse-postgres:5432/postgres
      SALT: mysalt
      ENCRYPTION_KEY: c919f04ecb969bab957c1f260799ff1114dbc98a5142b3f4c253af6fe58f480a
      TELEMETRY_ENABLED: "true"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:9090
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: myredissecret
      REDIS_TLS_ENABLED: "false"

  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    restart: always
    profiles: ["langfuse"]
    depends_on: *langfuse-depends-on
    ports:
      - "3000:3000"
    environment:
      <<: *langfuse-worker-env
      NEXTAUTH_SECRET: mysecret
      LANGFUSE_INIT_ORG_ID: rhiza
      LANGFUSE_INIT_ORG_NAME: Rhiza
      LANGFUSE_INIT_PROJECT_ID: rhiza-agents
      LANGFUSE_INIT_PROJECT_NAME: rhiza-agents
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: dev@local.dev
      LANGFUSE_INIT_USER_NAME: Dev
      LANGFUSE_INIT_USER_PASSWORD: devpassword

  langfuse-clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    restart: always
    profiles: ["langfuse"]
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    ports:
      - 127.0.0.1:8123:8123
      - 127.0.0.1:9000:9000
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  langfuse-minio:
    image: cgr.dev/chainguard/minio
    restart: always
    profiles: ["langfuse"]
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - 9090:9000
      - 127.0.0.1:9091:9001
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s

  langfuse-redis:
    image: docker.io/redis:7
    restart: always
    profiles: ["langfuse"]
    command: >
      --requirepass myredissecret
      --maxmemory-policy noeviction
    ports:
      - 127.0.0.1:6379:6379
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-postgres:
    image: docker.io/postgres:17
    restart: always
    profiles: ["langfuse"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data

volumes:
  esbuild-node-modules:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
  langfuse_redis_data:
